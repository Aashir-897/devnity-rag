{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="auth-title">Forgot Password</div>
  <p style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px">Enter your email and we'll send a reset link.</p>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-input" placeholder="you@example.com" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary">Send Reset Link</button>
  </form>
  <div class="auth-footer">
    Remember your password? <a href="{{ url_for('auth.login') }}">Login</a>
  </div>
</div>
{% endblock %}
