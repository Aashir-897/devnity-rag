{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="auth-title">Reset Password</div>
  <p style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px">Enter your new password below.</p>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input type="password" name="password" class="form-input" placeholder="Min 6 characters" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-input" placeholder="Repeat password" required>
    </div>
    <button type="submit" class="btn btn-primary">Reset Password</button>
  </form>
  <div class="auth-footer">
    <a href="{{ url_for('auth.login') }}">Back to Login</a>
  </div>
</div>
{% endblock %}
