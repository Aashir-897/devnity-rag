{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="auth-title">Welcome Back</div>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-input" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;" required>
    </div>
    <div style="text-align:right;margin-bottom:16px">
      <a href="{{ url_for('auth.forgot_password') }}" style="font-size:12px;color:var(--accent);font-weight:600;text-decoration:none">Forgot Password?</a>
    </div>
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  <div class="auth-footer">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
  </div>
</div>
{% endblock %}
