{% extends "base.html" %}

{% set is_auth_page = true %}

{% block title %}Create Account - Devnity AI{% endblock %}

{% block content %}
<div class="auth-logo">
    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Devnity AI">
    <p class="auth-logo-text">PDF Intelligence</p>
</div>

<div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start your PDF intelligence journey</p>

    {% if error %}
    <div class="auth-message error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}">

        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="Enter your email"
                required
                autofocus
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Create a password (min. 6 characters)"
                required
                minlength="6"
            >
        </div>

        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                class="form-input"
                placeholder="Confirm your password"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Create account
        </button>
    </form>

    <div class="auth-footer">
        Already have an account?
        <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
</div>
{% endblock %}
